<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行前通知</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <div class="app-banner">
      <img src="assets/banner.jpg" alt="活動 Banner" onerror="this.style.display='none'">
    </div>

    <div class="page-header">
      <a href="home.html" class="back">←</a>
      <h1>行前通知</h1>
    </div>

    <div class="app-body">
      <div class="content" style="padding-top:16px">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('notice1', this)">📋 注意事項1</button>
          <button class="tab-btn"        onclick="switchTab('notice2', this)">📋 注意事項2</button>
        </div>

        <div id="tab-notice1" class="tab-panel active">
          <img
            src="assets/prenotice-1.jpg"
            alt="注意事項1"
            class="zoomable"
            onclick="openZoom(this.src)"
            onerror="this.parentElement.innerHTML='<div class=\'card text-center\' style=\'padding:40px;color:var(--muted)\'>注意事項1 圖片待上傳</div>'"
          >
        </div>

        <div id="tab-notice2" class="tab-panel">
          <img
            src="assets/prenotice-2.jpg"
            alt="注意事項2"
            class="zoomable"
            onclick="openZoom(this.src)"
            onerror="this.parentElement.innerHTML='<div class=\'card text-center\' style=\'padding:40px;color:var(--muted)\'>注意事項2 圖片待上傳</div>'"
          >
        </div>
      </div>
    </div>

  </div>

  <div id="zoomOverlay" class="zoom-overlay" onclick="closeZoom()">
    <img id="zoomImg" src="" alt="">
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }

    function openZoom(src) {
      document.getElementById('zoomImg').src = src;
      document.getElementById('zoomOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
