<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報到掃碼</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .scanner-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      aspect-ratio: 1;
    }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .scan-guide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-box {
      width: 60%; aspect-ratio: 1;
      border: 3px solid rgba(255,255,255,.8);
      border-radius: 8px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,.35);
    }
    .result-card {
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      animation: fadeIn .2s ease;
    }
    .result-card.success { background: #DCFCE7; }
    .result-card.error   { background: #FEE2E2; }
    .result-card.warn    { background: #FEF9C3; }
    .result-icon  { font-size: 3rem; margin-bottom: 8px; }
    .result-msg   { font-size: 1.1rem; font-weight: 700; }
    .result-sub   { font-size: .9rem; color: var(--muted); margin-top: 4px; }
    @keyframes fadeIn { from { opacity:0; transform:scale(.95) } to { opacity:1; transform:scale(1) } }
    #canvas { display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="back">←</a>
    <h1>報到掃碼</h1>
  </nav>

  <div class="content">
    <div id="scanView">
      <div class="scanner-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-guide"><div class="scan-box"></div></div>
      </div>
      <canvas id="canvas"></canvas>
      <p class="text-muted text-center mt-16" style="font-size:.9rem">將 QR Code 對準框內</p>
      <div id="scanAlert" class="alert alert-error mt-16"></div>
    </div>

    <div id="resultView" style="display:none">
      <div id="resultCard" class="result-card">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-msg"  id="resultMsg"></div>
        <div class="result-sub"  id="resultSub"></div>
      </div>
      <button class="btn btn-primary mt-16" onclick="resumeScan()">繼續掃描</button>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../lib/jsQR.min.js"></script>
  <script>
    requireAdminAuth();

    const video      = document.getElementById('video');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const scanView   = document.getElementById('scanView');
    const resultView = document.getElementById('resultView');
    const scanAlert  = document.getElementById('scanAlert');

    let scanning = false;
    let animFrame = null;
    let stream    = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        scanning = true;
        scanFrame();
      } catch (err) {
        scanAlert.textContent = '無法開啟相機：' + err.message;
        scanAlert.classList.add('show');
      }
    }

    function scanFrame() {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'dontInvert',
        });
        if (code) {
          scanning = false;
          cancelAnimationFrame(animFrame);
          handleQR(code.data);
          return;
        }
      }
      animFrame = requestAnimationFrame(scanFrame);
    }

    async function handleQR(raw) {
      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch {
        showResult('error', '❌', 'QR Code 格式錯誤', raw);
        return;
      }

      const { name, code } = parsed;
      if (!name || !code) {
        showResult('error', '❌', 'QR Code 資料不完整', '');
        return;
      }

      const res = await callAPI('scan', { type: 'checkin', name, code });

      if (res.success) {
        showResult('success', '✅', res.message, res.name + '（' + res.group + '）');
      } else if (res.error === '已重複報到') {
        showResult('warn', '⚠️', '已重複報到', (res.name || '') + '（' + (res.group || '') + '）');
      } else {
        showResult('error', '❌', res.error || '發生錯誤', (res.name ? res.name + '（' + res.group + '）' : ''));
      }
    }

    function showResult(type, icon, msg, sub) {
      scanView.style.display   = 'none';
      resultView.style.display = 'block';
      const card = document.getElementById('resultCard');
      card.className = 'result-card ' + type;
      document.getElementById('resultIcon').textContent = icon;
      document.getElementById('resultMsg').textContent  = msg;
      document.getElementById('resultSub').textContent  = sub;

      // 成功時 2.5 秒後自動繼續
      if (type === 'success') {
        setTimeout(resumeScan, 2500);
      }
    }

    function resumeScan() {
      resultView.style.display = 'none';
      scanView.style.display   = 'block';
      scanning = true;
      scanFrame();
    }

    startCamera();
  </script>
</body>
</html>
