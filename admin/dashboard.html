<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台儀表板</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .stats-top {
      margin-bottom: 12px;
    }
    .stats-bottom {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px; text-align: center;
    }
    .stats-bottom .stat-card { padding: 12px 8px; }
    .stat-num   { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
    .stats-bottom .stat-num { font-size: 1.5rem; }
    .stat-label { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .stats-bottom .stat-label { font-size: .7rem; }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width .4s; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-head h2 { font-size: 1rem; }
    .search-input {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .9rem; margin-bottom: 12px;
    }
    .search-input:focus { outline: none; border-color: var(--primary); }
    #noResult { display: none; text-align: center; padding: 24px; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
<div class="admin-layout">

  <!-- 側邊欄（桌機） -->
  <aside class="sidebar">
    <div class="sidebar-title">後台管理</div>
    <a href="dashboard.html" class="active"><span class="s-icon">📊</span> 儀表板</a>
    <a href="checkin.html"><span class="s-icon">📷</span> 報到掃碼</a>
    <a href="checkout.html"><span class="s-icon">✅</span> 簽退核銷</a>
    <a href="manage.html"><span class="s-icon">✏️</span> 核銷管理</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-logout">
      <button onclick="logout()">登出</button>
    </div>
  </aside>

  <!-- 主內容 -->
  <main class="admin-main">
    <nav class="navbar">
      <h1>儀表板</h1>
      <button onclick="loadAll()" style="margin-left:auto;background:none;border:none;color:#fff;font-size:.85rem;cursor:pointer;">重新整理</button>
    </nav>

    <div class="content" style="padding-top:20px">
      <!-- 統計 - 上排：總人數 -->
      <div class="stats-top">
        <div class="stat-card">
          <div class="stat-num" id="numTotal">—</div>
          <div class="stat-label">總人數</div>
        </div>
      </div>
      <!-- 統計 - 下排：已報到 / 任務完成 / 已簽退 -->
      <div class="stats-bottom">
        <div class="stat-card">
          <div class="stat-num" style="color:var(--primary)" id="numCheckin">—</div>
          <div class="stat-label">已報到</div>
          <div class="progress-bar"><div class="progress-fill" id="barCheckin" style="width:0%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--success)" id="numMission">—</div>
          <div class="stat-label">任務完成</div>
          <div class="progress-bar"><div class="progress-fill" id="barMission" style="width:0%;background:var(--success)"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--warning)" id="numCheckout">—</div>
          <div class="stat-label">已簽退</div>
          <div class="progress-bar"><div class="progress-fill" id="barCheckout" style="width:0%;background:var(--warning)"></div></div>
        </div>
      </div>

      <!-- 名單 -->
      <div class="card">
        <div class="section-head">
          <h2>參與者名單</h2>
          <span id="listCount" style="font-size:.8rem;color:var(--muted)"></span>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="搜尋姓名或組別…" oninput="filterTable()">
        <div class="table-wrap">
          <table class="p-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>組別</th>
                <th>報到</th>
                <th>任務</th>
                <th>簽退</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="noResult">找不到符合的參與者</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 底部導覽（手機） -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="active"><span class="bn-icon">📊</span>儀表板</a>
  <a href="checkin.html"><span class="bn-icon">📷</span>報到</a>
  <a href="checkout.html"><span class="bn-icon">✅</span>簽退</a>
  <a href="manage.html"><span class="bn-icon">✏️</span>核銷</a>
</nav>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  requireAdminAuth();

  let allParticipants = [];

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function icon(ok) {
    return ok
      ? '<span class="icon-done">✔</span>'
      : '<span class="icon-none">—</span>';
  }

  function renderTable(list) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = list.map(p =>
      `<tr>
        <td>${esc(p.name)}</td>
        <td>${esc(p.group)}</td>
        <td>${icon(p.checkin)}</td>
        <td>${icon(p.mission)}</td>
        <td>${icon(p.checkout)}</td>
      </tr>`
    ).join('');
    document.getElementById('noResult').style.display = list.length ? 'none' : 'block';
    document.getElementById('listCount').textContent = list.length + ' 人';
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = q
      ? allParticipants.filter(p =>
          p.name.toLowerCase().includes(q) || p.group.toLowerCase().includes(q))
      : allParticipants;
    renderTable(filtered);
  }

  async function loadAll() {
    const [statsRes, listRes] = await Promise.all([
      callAPI('stats', {}),
      callAPI('list',  {}),
    ]);

    if (statsRes.success) {
      const { total, checkin, mission, checkout } = statsRes;
      document.getElementById('numTotal').textContent    = total;
      document.getElementById('numCheckin').textContent  = checkin;
      document.getElementById('numMission').textContent  = mission;
      document.getElementById('numCheckout').textContent = checkout;
      if (total > 0) {
        const pct = n => (n / total * 100) + '%';
        document.getElementById('barCheckin').style.width  = pct(checkin);
        document.getElementById('barMission').style.width  = pct(mission);
        document.getElementById('barCheckout').style.width = pct(checkout);
      }
    }

    if (listRes.success) {
      allParticipants = listRes.participants;
      renderTable(allParticipants);
    }
  }

  function logout() { clearAdminSession(); window.location.replace('index.html'); }

  loadAll();
</script>
</body>
</html>
