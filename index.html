<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動登入</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="text-center">活動報到系統</h1>
      <p class="subtitle text-center">請輸入姓名與驗證碼以登入</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="name">姓名</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="請輸入全名"
            autocomplete="name"
            inputmode="text"
            required
          >
        </div>

        <div class="form-group">
          <label for="code">驗證碼</label>
          <input
            type="text"
            id="code"
            name="code"
            placeholder="請輸入 5 位數字驗證碼"
            inputmode="numeric"
            maxlength="5"
            pattern="\d{5}"
            autocomplete="off"
            required
          >
        </div>

        <div id="errorAlert" class="alert alert-error" role="alert"></div>

        <button type="submit" id="submitBtn" class="btn btn-primary mt-16">
          <span class="btn-text">登入</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    // 已登入則直接跳過
    if (getSession()) {
      window.location.replace('home.html');
    }

    const form      = document.getElementById('loginForm');
    const nameInput = document.getElementById('name');
    const codeInput = document.getElementById('code');
    const errorAlert = document.getElementById('errorAlert');
    const submitBtn  = document.getElementById('submitBtn');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add('show');
    }
    function clearError() {
      errorAlert.classList.remove('show');
    }
    function setLoading(on) {
      submitBtn.classList.toggle('loading', on);
      submitBtn.disabled = on;
    }

    // 驗證碼只允許數字輸入
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 5);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const name = nameInput.value.trim();
      const code = codeInput.value.trim();

      if (!name) { showError('請輸入姓名'); nameInput.focus(); return; }
      if (!/^\d{5}$/.test(code)) { showError('驗證碼須為 5 位數字'); codeInput.focus(); return; }

      setLoading(true);
      const res = await callAPI('auth', { name, code });
      setLoading(false);

      if (res.success) {
        setSession(res);
        window.location.replace('home.html');
      } else {
        showError(res.error || '登入失敗，請確認姓名與驗證碼是否正確');
      }
    });
  </script>
</body>
</html>
