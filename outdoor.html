<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水、陸域安全宣導</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
    .tab-btn { flex-shrink: 0; min-width: 68px; font-size: .8rem; padding: 10px 6px; }
    .link-panel {
      margin-top: 8px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 20px;
      text-align: center;
    }
    .link-panel .link-icon { font-size: 2.4rem; margin-bottom: 14px; }
    .link-panel h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .link-panel p  { font-size: .85rem; color: var(--muted); margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="app-shell">

    <div class="app-banner">
      <img src="assets/banner.png" alt="活動 Banner" onerror="this.style.display='none'">
    </div>

    <div class="page-header">
      <a href="home.html" class="back">←</a>
      <h1>水、陸域安全宣導</h1>
    </div>

    <div class="app-body">
      <div class="content" style="padding-top:16px">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('icc',   this)">🏷 ICC表</button>
          <button class="tab-btn"        onclick="switchTab('land',  this)">🌿 陸域安全</button>
          <button class="tab-btn"        onclick="switchTab('water', this)">🌊 水域安全</button>
        </div>

        <div id="tab-icc" class="tab-panel active">
          <img
            src="assets/icc.png"
            alt="ICC分類表"
            class="zoomable"
            onclick="openZoom(this.src)"
            onerror="this.parentElement.innerHTML='<div class=\'card text-center\' style=\'padding:40px;color:var(--muted)\'>ICC分類表圖片待上傳</div>'"
          >
        </div>

        <div id="tab-land" class="tab-panel">
          <div class="link-panel">
            <div class="link-icon">🌿</div>
            <h3>陸域安全宣導</h3>
            <p>日月潭國家風景區陸域活動安全資訊</p>
            <a href="https://www.sunmoonlake.gov.tw/explore/ArticlesCollapsedFull?a=58"
               target="_blank" rel="noopener noreferrer"
               class="btn btn-primary" style="text-decoration:none;">
              前往陸域安全宣導 ↗
            </a>
          </div>
        </div>

        <div id="tab-water" class="tab-panel">
          <div class="link-panel">
            <div class="link-icon">🌊</div>
            <h3>水域安全宣導</h3>
            <p>日月潭水域活動安全資訊</p>
            <a href="https://water.sunmoonlake.gov.tw/apply.aspx"
               target="_blank" rel="noopener noreferrer"
               class="btn btn-primary" style="text-decoration:none;">
              前往水域安全宣導 ↗
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div id="zoomOverlay" class="zoom-overlay" onclick="closeZoom()">
    <img id="zoomImg" src="" alt="">
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }

    function openZoom(src) {
      document.getElementById('zoomImg').src = src;
      document.getElementById('zoomOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
