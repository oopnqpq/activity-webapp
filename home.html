<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首頁</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h1 id="pageTitle">活動首頁</h1>
  </nav>

  <div class="content">
    <div class="card text-center" style="margin-top:24px;">
      <p id="welcomeMsg" style="font-size:1.1rem;font-weight:600;margin-bottom:8px;">歡迎！</p>
      <p class="text-muted">Stage 1 登入驗證完成。</p>
      <p class="text-muted mt-8">home.html 主功能將於 Stage 3 實作。</p>
      <button class="btn btn-outline mt-24" onclick="logout()">登出</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const session = requireAuth();
    if (session) {
      document.getElementById('welcomeMsg').textContent = `歡迎，${session.name}（${session.group}）`;
    }

    function logout() {
      clearSession();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
