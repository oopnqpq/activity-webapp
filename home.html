<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動主頁</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <div class="app-banner">
      <img src="assets/banner.jpg" alt="活動 Banner" onerror="this.style.display='none'">
    </div>

    <div class="app-body">
      <div class="content" style="padding-top:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <p id="greeting" class="text-muted" style="font-size:.9rem"></p>
          <button onclick="logout()" style="background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;padding:4px 0">登出</button>
        </div>

        <div id="statusCard" class="card" style="padding:24px 20px;text-align:center">
          <p style="color:var(--muted);font-size:.9rem">請使用下方按鈕選擇功能</p>
        </div>
      </div>
    </div>

    <nav class="circle-nav">
      <a href="info.html" class="circle-btn">
        <div class="circle-icon">👤</div>
        <span class="circle-label">個人資訊</span>
      </a>
      <a href="safety.html" class="circle-btn">
        <div class="circle-icon">🗺️</div>
        <span class="circle-label">安全提醒<br>路線</span>
      </a>
      <a href="mission.html" class="circle-btn" id="missionBtn">
        <div class="circle-icon">🎯</div>
        <span class="circle-label">使命關卡</span>
      </a>
    </nav>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const session = requireAuth();
    if (session) {
      document.getElementById('greeting').textContent =
        '歡迎，' + session.name + '（' + session.group + '）';
    }

    const missionDone = localStorage.getItem('mission_done') === 'true';
    if (missionDone) {
      document.getElementById('missionBtn').classList.add('mission-done');
      document.getElementById('missionBtn').querySelector('.circle-label').innerHTML = '使命關卡<br>✅ 完成';
      document.getElementById('statusCard').innerHTML =
        '<p style="color:var(--success);font-weight:700;font-size:1rem">✅ 使命任務已完成</p>' +
        '<p style="color:var(--muted);font-size:.85rem;margin-top:6px">感謝你的參與！</p>';
    }

    function logout() {
      clearSession();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
