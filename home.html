<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動主頁</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <div class="app-banner banner-overlay-wrap">
      <img src="assets/banner.jpg" alt="活動 Banner" onerror="this.style.display='none'">
      <div class="banner-user-row">
        <span id="greeting"></span>
        <button class="btn-logout" onclick="logout()">登出</button>
      </div>
    </div>

    <div class="app-body">
      <div class="hub-pills">
        <a href="info.html" class="hub-pill">
          <h3>個人資訊</h3>
          <p>查看報到 QR Code 與組別</p>
        </a>
        <a href="safety.html" class="hub-pill">
          <h3>安全提醒 / 路線</h3>
          <p>活動注意事項與路線地圖</p>
        </a>
        <a href="mission.html" class="hub-pill" id="missionPill">
          <h3>使命關卡任務</h3>
          <p id="missionStatus">點擊開始任務</p>
        </a>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const session = requireAuth();
    if (session) {
      document.getElementById('greeting').textContent =
        '歡迎！' + session.name + '，您是 ' + session.group;
    }

    const missionDone = localStorage.getItem('mission_done') === 'true';
    if (missionDone) {
      document.getElementById('missionPill').classList.add('mission-done');
      document.getElementById('missionStatus').textContent = '✅ 任務已完成';
    }

    function logout() {
      clearSession();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
