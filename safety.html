<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動資訊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <div class="app-banner">
      <img src="assets/banner.jpg" alt="活動 Banner" onerror="this.style.display='none'">
    </div>

    <div class="page-header">
      <a href="home.html" class="back">←</a>
      <h1>活動資訊</h1>
    </div>

    <div class="app-body">
      <div class="content" style="padding-top:16px">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('schedule', this)">🗓 活動流程</button>
          <button class="tab-btn"        onclick="switchTab('route',    this)">🗺 路線地圖</button>
        </div>

        <div id="tab-schedule" class="tab-panel active">
          <img
            src="assets/schedule.jpg"
            alt="活動流程"
            class="zoomable"
            onclick="openZoom(this.src)"
            onerror="this.parentElement.innerHTML='<div class=\'card text-center\' style=\'padding:40px;color:var(--muted)\'>活動流程圖片待上傳</div>'"
          >
        </div>

        <div id="tab-route" class="tab-panel">
          <img
            src="assets/route.jpg"
            alt="活動路線"
            class="zoomable"
            onclick="openZoom(this.src)"
            onerror="this.parentElement.innerHTML='<div class=\'card text-center\' style=\'padding:40px;color:var(--muted)\'>路線地圖圖片待上傳</div>'"
          >
        </div>
      </div>
    </div>

  </div>

  <div id="zoomOverlay" class="zoom-overlay" onclick="closeZoom()">
    <img id="zoomImg" src="" alt="">
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }

    function openZoom(src) {
      document.getElementById('zoomImg').src = src;
      document.getElementById('zoomOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      document.getElementById('zoomOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
